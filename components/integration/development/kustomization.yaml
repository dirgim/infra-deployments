apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base
  - https://github.com/konflux-ci/integration-service/config/default?ref=f16f593be0a565a1267cf9e21777d7b9e43f897f
  - https://github.com/konflux-ci/integration-service/config/snapshotgc?ref=f16f593be0a565a1267cf9e21777d7b9e43f897f
images:
  - name: quay.io/redhat-appstudio/integration-service
    newName: quay.io/kpavic/integration-service
    newTag: STONEINTG-882-1
configMapGenerator:
  - name: console-url
    literals:
      - CONSOLE_NAME="Konflux Dev version"
      - CONSOLE_URL=""
      - CONSOLE_URL_TASKLOG=""
  - name: pipelinerun-options
    literals:
      - PIPELINE_TIMEOUT="3h"
      - TASKS_TIMEOUT="2h"
      - FINALLY_TIMEOUT="1h"
namespace: integration-service
patches:
  - path: manager_resources_patch.yaml
  - path: snapshotgc_inputs_patch.yaml
    target:
      kind: CronJob
      name: snapshot-garbage-collector
components:
  - ../rh-certs
